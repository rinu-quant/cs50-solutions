<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Quant Backtester{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background-color:#0f172a;
            color:white;
            font-family:Arial, Helvetica, sans-serif;
        }

        .navbar{
            background-color:#020617;
        }

        .card{
            background-color:#1e293b;
            border:none;
        }

        .form-control,
        .form-select{
            background-color:#020617;
            color:white;
            border:1px solid #334155;
        }

        .form-control::placeholder{
            color:#94a3b8;
        }

        h1{
            font-weight:600;
        }

        footer{
            margin-top:60px;
            color:#94a3b8;
            text-align:center;
        }

    </style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark px-4">

    <a class="navbar-brand" href="/">Quant Backtester</a>

    <div class="ms-auto">

        <a class="btn btn-outline-light me-2" href="/">Run Backtest</a>
        <a class="btn btn-outline-info" href="/history">Trade History</a>

    </div>

</nav>


<main class="container py-5">

    <div class="row justify-content-center">
        <div class="col-lg-6">

            <div class="card p-4 shadow">

                {% block main %}{% endblock %}

            </div>

        </div>
    </div>

</main>


<footer>
    Quant Strategy Backtesting Engine • Built with Python & Flask
</footer>

</body>
</html>
