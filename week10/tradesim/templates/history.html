{% extends "layout.html" %}

{% block title %}
HISTORY
{% endblock %}

{% block main %}
<table id="history-table">
    <thead>
        <tr>
            <th>Date</th>
            <th>Action</th>
            <th>Price</th>
            <th>Shares</th>
        </tr>
    </thead>
    <tbody>
        {% for trade in history %}
        <tr>
            <td>{{ trade.date.strftime('%Y-%m-%d') }}</td>
            <td>{{ trade.action }}</td>
            <td>{{ trade.price }}</td>
            <td>{{ trade.shares }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>


<a href="/">Back</a>

{% endblock %}
